name: Build FMILibrary

on:
  push:
    branches: [ci-test]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential curl unzip

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: |
          ./gradlew cmakeBuild
          ./gradlew :fmu-kt:linuxX64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-linux
          path: fmilib/build/fmilib-install/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: |
          ./gradlew cmakeBuild
          ./gradlew :fmu-kt:macosArm64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-macos
          path: fmilib/build/fmilib-install/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          ./gradlew cmakeBuild
          
      - name: List fmilib windows outputs
        run: Get-ChildItem -Recurse "D:\a\progetto-tirocinio\progetto-tirocinio\fmilib\build\fmilib-install\windows-amd64"

      - name: Show fmilib.h
        run: Get-Content "${{ github.workspace }}\fmilib\build\fmilib-install\windows-amd64\include\fmilib.h"

      - name: Check DLL dependencies with objdump
        shell: pwsh
        run: |
          $objdumpPath = "C:\Users\runneradmin\.konan\dependencies\msys2-mingw-w64-x86_64-2\bin\objdump.exe"
          $dllPath = "D:\a\progetto-tirocinio\progetto-tirocinio\fmilib\build\fmilib-install\windows-amd64\bin\libfmilib_shared.dll"
          if (Test-Path $objdumpPath) {
            Write-Host "objdump trovato a $objdumpPath"
            & $objdumpPath -p $dllPath | Select-String "DLL Name"
          } else {
            Write-Host "objdump NON trovato. Cercando alternativa..."
            # Fallback: prova a usare objdump dal PATH
            objdump -p $dllPath | Select-String "DLL Name"
          }

      - name: Test
        run: |
          ./gradlew :fmu-kt:mingwX64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-windows
          path: fmilib/build/fmilib-install/