name: Build FMILibrary

on:
  push:
    branches: [ci-test]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: debian:buster   # glibc 2.28, compatibile con KN
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git cmake build-essential curl unzip

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: |
          ./gradlew cmakeBuild
          ./gradlew :fmu-kt:linuxX64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-linux
          path: fmilib/build/fmilib-install/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: |
          ./gradlew cmakeBuild
          ./gradlew :fmu-kt:macosArm64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-macos
          path: fmilib/build/fmilib-install/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: |
          ./gradlew cmakeBuild
          ./gradlew :fmu-kt:mingwX64Test

      - name: Upload install dir
        uses: actions/upload-artifact@v4
        with:
          name: fmilib-windows
          path: fmilib/build/fmilib-install/